<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Intellengent Machines Agentic Assitant</title>
  <link rel="stylesheet" href="/styles.css?v=4" />
  <script src="/app.js?v=4" defer></script>
</head>
<body>
  <header class="site-header">
    <img src="/assets/imachines-logo.png" alt="I Machines" class="logo" />
    <div>
      <h1>Intellengent Machines Agentic Assitant</h1>
      <p id="status-label">Connecting…</p>
    </div>
  </header>

  <main class="layout">
    <section class="actions">
      <button type="button" id="btn-new-session" class="action-card">New conversation</button>
      <button type="button" id="btn-history" class="action-card">Conversation history</button>
    </section>

    <p id="mic-banner" class="mic-banner hidden"></p>
    <p id="context-banner" class="context-banner hidden"></p>
    <p class="session-meta">
      <span id="session-label">No active session</span>
      <span id="turn-count-label"></span>
    </p>

    <section class="model-picker">
      <label for="llm-model-select">LLM model</label>
      <select id="llm-model-select" aria-label="Select LLM model"></select>
      <label for="tools-enabled-select">Agent tools</label>
      <select id="tools-enabled-select" aria-label="Enable or disable agent tools">
        <option value="true">On — RAG, web search, tools</option>
        <option value="false">Off — plain LLM only</option>
      </select>
    </section>

    <div id="chat-log" class="chat-log">
      <p class="empty-hint">Start a <strong>New conversation</strong>, then use <strong>Voice</strong> or <strong>Text</strong> mode below.</p>
    </div>

    <p id="listen-status" class="listen-status hidden" aria-live="polite"></p>
    <div id="busy" class="busy hidden">Processing turn…</div>

    <section class="input-mode-tabs" role="tablist" aria-label="Input mode">
      <button type="button" class="mode-tab active" id="mode-tab-voice" data-mode="voice" role="tab" aria-selected="true" aria-controls="voice-controls">
        Voice
      </button>
      <button type="button" class="mode-tab" id="mode-tab-text" data-mode="text" role="tab" aria-selected="false" aria-controls="text-controls">
        Text
      </button>
    </section>

    <section id="voice-controls" class="controls" role="tabpanel">
      <button type="button" id="btn-record" class="btn primary">Start listening</button>
      <button type="button" id="btn-stop" class="btn" disabled>Stop listening</button>
      <label class="btn upload-label">
        Upload WAV
        <input type="file" id="file-upload" accept="audio/*,.wav,.webm,.ogg,.mp3,.m4a" hidden />
      </label>
    </section>

    <section id="text-controls" class="text-controls hidden" role="tabpanel">
      <label for="text-input" class="sr-only">Your message</label>
      <textarea id="text-input" rows="3" placeholder="Type your message… (Enter to send, Shift+Enter for new line)"></textarea>
      <div class="text-controls-row">
        <label class="speak-reply-label">
          <input type="checkbox" id="speak-reply" />
          Speak reply (TTS)
        </label>
        <button type="button" id="btn-send-text" class="btn primary">Send</button>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <img src="/assets/imachines-logo.png" alt="" class="logo small" />
    <span>Local voice AI · Project 1 staged pipeline</span>
  </footer>

  <div id="history-overlay" class="overlay hidden">
    <div class="modal">
      <header>
        <h2>Conversation history</h2>
        <button type="button" id="btn-close-history" aria-label="Close">×</button>
      </header>
      <div class="tabs">
        <button type="button" class="tab active" data-tab="current">This session</button>
        <button type="button" class="tab" data-tab="all">All sessions</button>
      </div>
      <div id="history-current" class="history-panel"></div>
      <div id="history-all" class="history-panel hidden"></div>
    </div>
  </div>
</body>
</html>
