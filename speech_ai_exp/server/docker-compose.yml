services:
  postgres:
    image: postgres:16-alpine
    container_name: horizon_store_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: horizon
      POSTGRES_PASSWORD: horizon
      POSTGRES_DB: horizon_store
    ports:
      - "5432:5432"
    volumes:
      - horizon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U horizon -d horizon_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  horizon_pg_data:
