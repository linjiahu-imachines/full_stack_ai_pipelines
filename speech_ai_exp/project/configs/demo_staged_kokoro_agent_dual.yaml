# Dual LLM preset — runtime UI selection between local HF and remote API.
# Voice flow: ASR (local) → LLM (selected per turn) → TTS (local) + agent RAG/tools.
asr:
  model_size: small
  device: cpu
  compute_type: int8

tts:
  backend: kokoro
  kokoro_lang_code: a
  kokoro_voice: af_heart
  kokoro_speed: 1.0

llm_models:
  default: local_model_on_thor_machine
  models:
    local_model_on_thor_machine:
      label: Qwen2.5-1B LLM on NVIDIA Thor Machine with ARM64 CPU
      backend: hf
      hf_model: Qwen/Qwen2.5-1.5B-Instruct
      hf_device: auto
      hf_max_new_tokens: 256
      temperature: 0.2
      system_prompt: >-
        You are a voice customer-service agent for Alex Morgan at Horizon Store
        (fictional e-commerce). Help with orders, shipping, returns, refunds,
        warranties, loyalty, and account questions. For Alex's orders and store
        policies, use the knowledge base. For weather, news, and other live
        public information, use web search results or the search_web tool.
        Address the customer as Alex. Be accurate and concise for spoken delivery.

    # Enable when HF_TOKEN is configured for google/gemma-3-1b-it
    # local_gemma3_model_on_thor_machine:
    #   label: Gemma3-1B LLM on NVIDIA Thor Machine with ARM64 CPU
    #   backend: hf
    #   hf_model: google/gemma-3-1b-it
    #   hf_device: auto
    #   hf_max_new_tokens: 256
    #   temperature: 0.2
    #   system_prompt: >-
    #     You are a voice customer-service agent for Alex Morgan at Horizon Store
    #     (fictional e-commerce). Help with orders, shipping, returns, refunds,
    #     warranties, loyalty, and account questions. Use only facts from the
    #     knowledge base. Address the customer as Alex. Be accurate and concise
    #     for spoken delivery.

    remote_model_on_remote_sim_im_cpu:
      label: Gemma3-1B LLM on Intelligent Machine IMI-RISCV Qemu CPU Emulator
      backend: remote
      remote_base_url: http://172.16.1.7:8080
      remote_model: local-model
      remote_api_key: abcdefg
      max_tokens: 96
      temperature: 0.2
      system_prompt: >-
        You are a voice customer-service agent for Alex Morgan at Horizon Store
        (fictional e-commerce). Help with orders, shipping, returns, refunds,
        warranties, loyalty, and account questions. For Alex's orders and store
        policies, use the knowledge base. For weather, news, and other live
        public information, use web search results or the search_web tool.
        Address the customer as Alex. Be accurate and concise for spoken delivery.

agent:
  enabled: true
  knowledge_dir: data/knowledge
  knowledge_index: data/knowledge_index.json
  rag_top_k: 3
  max_tool_steps: 3
  inject_rag: true
  database:
    enabled: true
    # Set DATABASE_SQL_URL in server/.env.local to override credentials/host.
    sql_url: postgresql+psycopg://horizon:horizon@127.0.0.1:5432/horizon_store
    vector_path: data/chroma
    vector_collection: horizon_kb
    embed_model: sentence-transformers/all-MiniLM-L6-v2
    rag_backend: hybrid
  web_search:
    enabled: true
    provider: tavily
    # Set TAVILY_API_KEY in the environment (recommended) or paste key here:
    # tavily_api_key: tvly-...
    max_results: 5
    search_depth: basic
    auto_search: true
