# Chatbot preset — remote LLM server + Kokoro TTS + agent (RAG + tools).
# Voice flow: ASR (local) → LLM (HTTP on remote server) → TTS (local)
asr:
  model_size: small
  device: cpu
  compute_type: int8

llm:
  backend: remote
  remote_base_url: http://172.16.1.7:8080
  remote_model: local-model
  remote_api_key: abcdefg
  max_tokens: 256
  temperature: 0.2
  system_prompt: "You are a helpful voice assistant for I Machines. Be accurate and concise."

tts:
  backend: kokoro
  kokoro_lang_code: a
  kokoro_voice: af_heart
  kokoro_speed: 1.0

agent:
  enabled: true
  knowledge_dir: data/knowledge
  knowledge_index: data/knowledge_index.json
  rag_top_k: 3
  max_tool_steps: 3
  inject_rag: true
