# Chatbot preset — Kokoro TTS + agent (RAG + tools).
asr:
  model_size: small
  device: cpu
  compute_type: int8

llm:
  backend: hf
  hf_model: Qwen/Qwen2.5-1.5B-Instruct
  hf_device: auto
  hf_max_new_tokens: 256
  temperature: 0.2
  system_prompt: "You are a helpful voice assistant for I Machines. Be accurate and concise."

tts:
  backend: kokoro
  kokoro_lang_code: a
  kokoro_voice: af_heart
  kokoro_speed: 1.0

agent:
  enabled: true
  knowledge_dir: data/knowledge
  knowledge_index: data/knowledge_index.json
  rag_top_k: 3
  max_tool_steps: 3
  inject_rag: true
