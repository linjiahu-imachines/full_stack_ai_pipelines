-carbon_set=QEMU_PATH,/path/to/csqemu-v9/install-local
-carbon_set=SIM_BIN,/path/to/llama.cpp/llamacpp-imi-install/bin/test-backend-ops
func::live_trace=$carbon<QEMU_PATH>/bin/qemu-riscv64.so
func::memory=$carbon<QEMU_PATH>/bin/qemu-riscv64.so
func::execution=/path/to/IMachines_Spike/build/libriscv.so 
func::argv=qemu.so -one-insn-per-tb -d nochain -umode -internal-syscall -cosim -plugin $carbon<QEMU_PATH>/plugins/libcosim.so $carbon<SIM_BIN> perf -o MUL_MAT -b CPU -p type_a=q8_0,type_b=f32,m=4096,n=1
func::imi_spike::no_args::m_pk=--isa=RV64GCV_zvl128b /path/to/IMachines_Spike/pk_binary/pk $carbon<SIM_BIN> perf -o MUL_MAT -b CPU -p type_a=q8_0,type_b=f32,m=4096,n=1
perf_setup_delay=0 
listen_to_roi=true 
wait_for_roi=1
perf=/path/to/Pilos/build/libpilos.so 
perf::pilos::sch::knob_apply_umode=true
perf::pilos::threads=1
perf::pilos::sch::knob_VLEN=128
perf::pilos::sch::knob_mem_load_pipe_enabled=false
perf::pilos::sch::knob_trace_skip_vector_exe=true
perf::pilos::sch::knob_enable_retire_file=true
live_trace_translation=false
live_trace_offset=31920